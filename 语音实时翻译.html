<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gemini 语音翻译</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f5f7; --card: #ffffff; --primary: #007aff;
  --text: #1d1d1f; --text2: #86868b; --border: #e5e5ea;
  --radius: 16px; --mic-active: #ff3b30;
}
body {
  font-family: -apple-system,BlinkMacSystemFont,'SF Pro','Hiragino Sans GB','PingFang SC','Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
}
.header { background: var(--card); padding: 14px 16px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 20px; font-weight: 600; text-align: center; }
.header p { font-size: 11px; color: var(--text2); text-align: center; margin-top: 2px; }
.key-bar { background: #fff8e1; padding: 8px 16px; border-bottom: 1px solid #ffe082; display: flex; gap: 6px; align-items: center; }
.key-bar input { flex: 1; border: 1px solid #ffe082; border-radius: 8px; padding: 6px 10px; font-size: 13px; background: #fff; outline: none; font-family: inherit; }
.key-bar input:focus { border-color: var(--primary); }
.key-bar label { font-size: 11px; color: #795548; white-space: nowrap; font-weight: 500; }
.lang-bar { display: flex; background: var(--card); padding: 10px 16px; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
.lang-group { text-align: center; }
.lang-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.lang-btns { display: flex; gap: 4px; }
.lang-btn { padding: 5px 10px; border: 1.5px solid var(--border); background: var(--card); border-radius: 14px; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .2s; }
.lang-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.lang-swap { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 8px; flex-shrink: 0; }
.mic-area { display: flex; flex-direction: column; align-items: center; padding: 20px 16px 12px; }
.mic-btn {
  width: 80px; height: 80px; border-radius: 50%; border: none;
  background: var(--primary); color: #fff; font-size: 34px;
  cursor: pointer; transition: all .3s; box-shadow: 0 4px 20px rgba(0,122,255,.3);
  display: flex; align-items: center; justify-content: center;
}
.mic-btn.listening { background: var(--mic-active); box-shadow: 0 4px 30px rgba(255,59,48,.5); animation: pulse 1.5s infinite; }
.mic-btn.busy { background: #666; box-shadow: none; animation: none; }
@keyframes pulse { 0% { box-shadow: 0 4px 20px rgba(255,59,48,.3); } 50% { box-shadow: 0 4px 40px rgba(255,59,48,.6); } 100% { box-shadow: 0 4px 20px rgba(255,59,48,.3); } }
.mic-status { font-size: 12px; color: var(--text2); margin-top: 8px; text-align: center; min-height: 18px; }
.mic-status.active { color: var(--mic-active); font-weight: 500; }
.toggle-row { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 0 16px 12px; font-size: 12px; color: var(--text2); }
.toggle { position: relative; width: 40px; height: 24px; background: #e5e5ea; border-radius: 12px; cursor: pointer; transition: background .3s; }
.toggle.on { background: var(--primary); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform .3s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle.on::after { transform: translateX(16px); }
.translate-box { padding: 0 16px 10px; }
.card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.card-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.card-label .lang-tag { font-size: 10px; background: #e8f0fe; color: var(--primary); padding: 1px 5px; border-radius: 4px; }
.card-text { font-size: 15px; line-height: 1.6; min-height: 22px; word-break: break-word; }
.card-text .hint { color: #c7c7cc; font-style: italic; }
.card-text.fade-in { animation: fadeIn .3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.actions-row { display: flex; gap: 6px; margin-top: 8px; }
.actions-row .act { padding: 6px 12px; border: 1px solid var(--border); background: var(--card); border-radius: 8px; font-size: 12px; color: var(--text); cursor: pointer; text-align: center; flex: 1; }
.actions-row .act:active { background: var(--border); }
.manual-area { padding: 0 16px 10px; }
.manual-toggle { text-align: center; padding: 6px; font-size: 12px; color: var(--primary); cursor: pointer; }
.manual-box { display: none; }
.manual-box.show { display: block; }
.manual-box textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px; font-size: 15px; font-family: inherit; outline: none; resize: none; min-height: 50px; color: var(--text); background: var(--card); }
.manual-box textarea:focus { border-color: var(--primary); }
.history-section { padding: 0 16px 24px; }
.history-title { font-size: 13px; font-weight: 600; color: var(--text2); margin: 6px 0 8px; display: flex; justify-content: space-between; }
.history-item { background: var(--card); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
.hi-src { font-size: 13px; color: var(--text); margin-bottom: 3px; }
.hi-dst { font-size: 13px; color: var(--primary); font-weight: 500; }
.hi-meta { font-size: 10px; color: var(--text2); margin-top: 3px; }
.hi-copy { float: right; border: none; background: none; color: var(--text2); font-size: 12px; cursor: pointer; padding: 2px 4px; }
.clear-btn { border: none; background: none; color: var(--primary); font-size: 12px; cursor: pointer; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,.8); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all .3s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>🎤 Gemini 语音翻译</h1>
  <p>浏览器语音流 + Gemini 纠错翻译 · 一次点击持续使用</p>
</div>

<div class="key-bar">
  <label>Gemini Key</label>
  <input type="password" id="apiKeyInput" placeholder="输入你的 Gemini API Key" />
</div>

<div class="lang-bar">
  <div class="lang-group">
    <div class="lang-label" id="labelSrc">中文</div>
    <div class="lang-btns">
      <button class="lang-btn active" data-lang="zh-CN" onclick="setLang('src',this)">中文</button>
      <button class="lang-btn" data-lang="ja" onclick="setLang('src',this)">日文</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('src',this)">英文</button>
    </div>
  </div>
  <button class="lang-swap" onclick="swapLang()">⇄</button>
  <div class="lang-group">
    <div class="lang-label" id="labelDst">日本語</div>
    <div class="lang-btns">
      <button class="lang-btn" data-lang="zh-CN" onclick="setLang('dst',this)">中文</button>
      <button class="lang-btn active" data-lang="ja" onclick="setLang('dst',this)">日文</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('dst',this)">英文</button>
    </div>
  </div>
</div>

<div class="mic-area">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="mic-status" id="micStatus">点击🎤开始 · 说完自动续听</div>
</div>

<div class="toggle-row">
  <span>自动朗读</span>
  <div class="toggle on" id="autoSpeakToggle" onclick="toggleAutoSpeak()"></div>
</div>

<div class="translate-box">
  <div class="card">
    <div class="card-label"><span>📝 识别文字</span><span class="lang-tag" id="srcTag">中文</span></div>
    <div class="card-text" id="recogText"><span class="hint">等待语音输入…</span></div>
  </div>
  <div class="card">
    <div class="card-label"><span>🌐 翻译结果</span><span class="lang-tag" id="dstTag">日本語</span></div>
    <div class="card-text" id="transText"><span class="hint">Gemini 纠错翻译…</span></div>
    <div class="actions-row">
      <button class="act" onclick="copyTrans()">📋 复制</button>
      <button class="act" onclick="speakTrans()">🔊 朗读</button>
    </div>
  </div>
</div>

<div class="manual-area">
  <div class="manual-toggle" onclick="toggleManual()">✏️ 键盘输入</div>
  <div class="manual-box" id="manualBox">
    <textarea id="manualInput" placeholder="输入文字后自动翻译…" oninput="onManualInput()"></textarea>
  </div>
</div>

<div class="history-section">
  <div class="history-title"><span>📜 记录</span><button class="clear-btn" onclick="clearHistory()">清除</button></div>
  <div id="historyList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── config ──
const GEMINI_MODEL = 'gemini-3.5-flash';
const LANG = {
  'zh-CN': { label: '中文', recog: 'zh-CN', tts: 'zh-CN' },
  'ja':     { label: '日本語', recog: 'ja-JP', tts: 'ja' },
  'en':     { label: 'English', recog: 'en-US', tts: 'en-US' },
};
let srcLang = 'zh-CN';
let dstLang = 'ja';
let autoSpeak = true;
let isActive = false;       // 麦克风是否在运行
let translating = false;    // 正在翻译中
let recognition = null;
let history = [];
let manualShowing = false;

// 加载保存
try {
  const k = localStorage.getItem('gk');
  if (k) document.getElementById('apiKeyInput').value = k;
  const h = localStorage.getItem('gh');
  if (h) history = JSON.parse(h);
} catch(e) {}
renderHistory();

function getApiKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k) { showToast('⚠ 请输入 Gemini API Key'); return null; }
  localStorage.setItem('gk', k);
  return k;
}

function setLang(role, btn) {
  btn.parentElement.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (role === 'src') srcLang = btn.dataset.lang;
  else dstLang = btn.dataset.lang;
  document.getElementById('labelSrc').textContent = LANG[srcLang].label;
  document.getElementById('labelDst').textContent = LANG[dstLang].label;
  document.getElementById('srcTag').textContent = LANG[srcLang].label;
  document.getElementById('dstTag').textContent = LANG[dstLang].label;
}

function swapLang() {
  [srcLang, dstLang] = [dstLang, srcLang];
  document.getElementById('labelSrc').textContent = LANG[srcLang].label;
  document.getElementById('labelDst').textContent = LANG[dstLang].label;
  document.getElementById('srcTag').textContent = LANG[srcLang].label;
  document.getElementById('dstTag').textContent = LANG[dstLang].label;
  document.querySelectorAll('.lang-group:first-child .lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === srcLang));
  document.querySelectorAll('.lang-group:last-child .lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === dstLang));
}

// ── 麦克风 ──
function toggleMic() {
  if (isActive) {
    stopListening();
  } else {
    if (!getApiKey()) return;
    startListening();
  }
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('⚠ 浏览器不支持语音识别'); return; }

  if (recognition) recognition.abort();
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = LANG[srcLang].recog;

  let lastFinal = '';

  recognition.onresult = (e) => {
    let final = '';
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    // 显示实时结果
    const display = final + interim;
    if (display.trim()) {
      document.getElementById('recogText').textContent = display;
    }

    // 每段完整句子触发翻译
    if (final.trim() && final.trim() !== lastFinal) {
      lastFinal = final.trim();
      correctAndTranslate(final.trim());
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    showToast('⚠ 语音错误: ' + e.error);
  };

  recognition.onend = () => {
    if (isActive) {
      // 自动重启
      try { recognition.start(); } catch(e) {}
    }
  };

  try {
    recognition.start();
    isActive = true;
    updateUI();
    showToast('🎤 录音中…');
  } catch(e) {
    showToast('⚠ 启动失败');
  }
}

function stopListening() {
  isActive = false;
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
  updateUI();
}

function updateUI() {
  const btn = document.getElementById('micBtn');
  const st = document.getElementById('micStatus');
  if (translating) {
    btn.className = 'mic-btn busy';
    btn.textContent = '⏳';
    st.textContent = 'Gemini 翻译中…';
    st.className = 'mic-status';
  } else if (isActive) {
    btn.className = 'mic-btn listening';
    btn.textContent = '🔴';
    st.textContent = '🎤 聆听中… 说完自动翻译';
    st.className = 'mic-status active';
  } else {
    btn.className = 'mic-btn';
    btn.textContent = '🎤';
    st.textContent = '点击🎤开始 · 说完自动续听';
    st.className = 'mic-status';
  }
}

// ── Gemini 纠错+翻译 ──
let transQueue = Promise.resolve();

function correctAndTranslate(text) {
  // 避免重复翻译相同文字
  if (translating) return;
  translating = true;
  updateUI();

  transQueue = transQueue.then(async () => {
    try {
      const prompt = `You are a professional interpreter. The following text was recognized by speech recognition. First, correct any recognition errors. Then translate the corrected text from ${LANG[srcLang].label} to ${LANG[dstLang].label}.

Respond in this exact JSON format (no markdown):
{"corrected": "the corrected text here", "translation": "the translation here"}

Text: ${text}`;

      const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${getApiKey()}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        }
      );

      if (!resp.ok) {
        if (resp.status === 429) showToast('⚠ API 配额超限');
        else showToast(`⚠ API 错误 ${resp.status}`);
        translating = false;
        updateUI();
        return;
      }

      const data = await resp.json();
      const result = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
      let corrected = '', translation = '';

      try {
        const m = result.match(/\{[\s\S]*"translation"[\s\S]*\}/);
        if (m) {
          const p = JSON.parse(m[0]);
          corrected = p.corrected || text;
          translation = p.translation || '';
        }
      } catch(e) {}

      if (corrected) {
        document.getElementById('recogText').textContent = corrected;
        document.getElementById('recogText').className = 'card-text fade-in';
      }
      if (translation) {
        document.getElementById('transText').textContent = translation;
        document.getElementById('transText').className = 'card-text fade-in';
        addHistory(corrected || text, translation);
        if (autoSpeak) {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(translation);
          u.lang = LANG[dstLang].tts;
          u.rate = 0.9;
          window.speechSynthesis.speak(u);
        }
      }
    } catch(e) {
      showToast('⚠ 网络错误');
    }
    translating = false;
    updateUI();
  });
}

// ── 朗读 ──
function speakTrans() {
  const t = document.getElementById('transText').textContent;
  if (!t || t === 'Gemini 纠错翻译…') return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(t);
  u.lang = LANG[dstLang].tts;
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
  showToast('🔊 朗读');
}

function toggleAutoSpeak() {
  autoSpeak = !autoSpeak;
  document.getElementById('autoSpeakToggle').classList.toggle('on', autoSpeak);
}

// ── 手动翻译 ──
function toggleManual() {
  manualShowing = !manualShowing;
  document.getElementById('manualBox').classList.toggle('show', manualShowing);
  if (manualShowing) document.getElementById('manualInput').focus();
}
let manualTimer;
function onManualInput() {
  clearTimeout(manualTimer);
  const t = document.getElementById('manualInput').value.trim();
  if (!t) { document.getElementById('transText').innerHTML = '<span class="hint">输入后自动翻译…</span>'; return; }
  if (!getApiKey()) return;
  document.getElementById('recogText').textContent = t;
  manualTimer = setTimeout(() => doManualTranslate(t), 600);
}
async function doManualTranslate(text) {
  const out = document.getElementById('transText');
  out.innerHTML = '⏳';
  try {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${getApiKey()}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: `Translate from ${LANG[srcLang].label} to ${LANG[dstLang].label}. Reply ONLY the translation: ${text}` }] }] })
    });
    const d = await r.json();
    const res = d?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '失败';
    out.textContent = res;
    out.className = 'card-text fade-in';
    addHistory(text, res);
  } catch(e) { out.innerHTML = '<span style="color:#ff3b30">⚠ 失败</span>'; }
}

// ── 复制 ──
function copyTrans() {
  const t = document.getElementById('transText').textContent;
  if (!t || t === 'Gemini 纠错翻译…') return;
  navigator.clipboard.writeText(t).then(() => showToast('📋 已复制')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); showToast('📋 已复制');
  });
}

// ── 历史 ──
function addHistory(src, dst) {
  const n = new Date();
  const t = n.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  history.unshift({ src, dst, time: t, sl: LANG[srcLang].label, dl: LANG[dstLang].label });
  if (history.length > 50) history.pop();
  try { localStorage.setItem('gh', JSON.stringify(history)); } catch(e) {}
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) { el.innerHTML = '<div style="text-align:center;color:#c7c7cc;padding:16px;font-size:13px">暂无记录</div>'; return; }
  el.innerHTML = history.map(h => `<div class="history-item"><button class="hi-copy" onclick="copyText('${escHtml(h.dst)}')">复制</button><div class="hi-src">${escHtml(h.src)}</div><div class="hi-dst">${escHtml(h.dst)}</div><div class="hi-meta">${h.sl} → ${h.dl} · ${h.time}</div></div>`).join('');
}
function clearHistory() { history = []; localStorage.setItem('gh', '[]'); renderHistory(); showToast('已清除'); }
function copyText(t) {
  navigator.clipboard.writeText(t).then(() => showToast('📋 已复制')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); showToast('📋 已复制');
  });
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._hide); t._hide = setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
