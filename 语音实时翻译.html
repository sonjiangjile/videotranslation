<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Whisper 语音翻译</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #f5f5f7; --card: #fff; --primary: #007aff; --text: #1d1d1f; --text2: #86868b; --border: #e5e5ea; --radius: 16px; --active: #ff3b30; }
body { font-family: -apple-system,BlinkMacSystemFont,'SF Pro','Hiragino Sans GB','PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
.header { background: var(--card); padding: 14px 16px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 20px; font-weight: 600; text-align: center; }
.header p { font-size: 11px; color: var(--text2); text-align: center; margin-top: 2px; }
.key-bar { background: #fff8e1; padding: 6px 16px; border-bottom: 1px solid #ffe082; display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.key-bar input { flex: 1; min-width: 80px; border: 1px solid #ffe082; border-radius: 6px; padding: 4px 8px; font-size: 12px; background: #fff; outline: none; font-family: inherit; }
.key-bar input:focus { border-color: var(--primary); }
.key-bar label { font-size: 10px; color: #795548; white-space: nowrap; font-weight: 500; }
.key-bar.saved { justify-content: space-between; }
.key-bar.saved span { font-size: 12px; color: #2e7d32; font-weight: 500; }
.key-save, .key-change { border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-weight: 500; }
.key-save { background: #2e7d32; color: #fff; }
.key-change { background: #e0e0e0; color: #333; }
.lang-bar { display: flex; background: var(--card); padding: 10px 16px; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
.lang-group { text-align: center; }
.lang-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.lang-btns { display: flex; gap: 4px; }
.lang-btn { padding: 5px 10px; border: 1.5px solid var(--border); background: var(--card); border-radius: 14px; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; transition: all .2s; }
.lang-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.lang-swap { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 8px; flex-shrink: 0; }
.mic-area { display: flex; flex-direction: column; align-items: center; padding: 20px 16px 10px; }
.mic-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--primary); color: #fff; font-size: 34px; cursor: pointer; transition: all .3s; box-shadow: 0 4px 20px rgba(0,122,255,.3); display: flex; align-items: center; justify-content: center; }
.mic-btn.recording { background: var(--active); box-shadow: 0 4px 30px rgba(255,59,48,.5); animation: pulse 1.5s infinite; }
.mic-btn.busy { background: #666; box-shadow: none; animation: none; }
@keyframes pulse { 0% { box-shadow: 0 4px 20px rgba(255,59,48,.3); } 50% { box-shadow: 0 4px 40px rgba(255,59,48,.6); } 100% { box-shadow: 0 4px 20px rgba(255,59,48,.3); } }
.mic-status { font-size: 12px; color: var(--text2); margin-top: 8px; text-align: center; min-height: 18px; }
.mic-status.active { color: var(--active); font-weight: 500; }
.toggle-row { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 0 16px 12px; font-size: 12px; color: var(--text2); }
.toggle { position: relative; width: 40px; height: 24px; background: #e5e5ea; border-radius: 12px; cursor: pointer; transition: background .3s; }
.toggle.on { background: var(--primary); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform .3s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle.on::after { transform: translateX(16px); }
.box { padding: 0 16px 10px; }
.card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.card-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.card-label .tag { font-size: 10px; background: #e8f0fe; color: var(--primary); padding: 1px 5px; border-radius: 4px; }
.card-text { font-size: 15px; line-height: 1.6; min-height: 22px; word-break: break-word; }
.card-text .hint { color: #c7c7cc; font-style: italic; }
.card-text.fade-in { animation: fadeIn .3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.actions { display: flex; gap: 6px; margin-top: 8px; }
.actions .btn { padding: 6px 12px; border: 1px solid var(--border); background: var(--card); border-radius: 8px; font-size: 12px; color: var(--text); cursor: pointer; text-align: center; flex: 1; }
.actions .btn:active { background: var(--border); }
.manual-area { padding: 0 16px 10px; }
.manual-toggle { text-align: center; padding: 6px; font-size: 12px; color: var(--primary); cursor: pointer; }
.manual-box { display: none; }
.manual-box.show { display: block; }
.manual-box textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px; font-size: 15px; font-family: inherit; outline: none; resize: none; min-height: 50px; color: var(--text); background: var(--card); }
.manual-box textarea:focus { border-color: var(--primary); }
.history-section { padding: 0 16px 24px; }
.history-title { font-size: 13px; font-weight: 600; color: var(--text2); margin: 6px 0 8px; display: flex; justify-content: space-between; }
.history-item { background: var(--card); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
.hi-src { font-size: 13px; color: var(--text); margin-bottom: 3px; }
.hi-dst { font-size: 13px; color: var(--primary); font-weight: 500; }
.hi-meta { font-size: 10px; color: var(--text2); margin-top: 3px; }
.hi-copy { float: right; border: none; background: none; color: var(--text2); font-size: 12px; cursor: pointer; padding: 2px 4px; }
.clear-btn { border: none; background: none; color: var(--primary); font-size: 12px; cursor: pointer; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,.8); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all .3s; pointer-events: none; z-index: 100; backdrop-filter: blur(10px); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>🎤 Whisper 语音翻译</h1>
  <p>OpenAI Whisper 识别 + Gemini 翻译 · 一次点击持续使用</p>
</div>

<div class="key-bar" id="keyBar">
  <label>OpenAI</label>
  <input type="password" id="openaiKey" placeholder="sk-..." />
  <label>Gemini</label>
  <input type="password" id="geminiKey" placeholder="AI..." />
  <button class="key-save" onclick="saveKeys()">✓</button>
</div>
<div class="key-bar saved" id="keySaved" style="display:none">
  <span id="keyHint">✅ API Keys 已设置</span>
  <button class="key-change" onclick="showKeyInput()">更换</button>
</div>

<div class="lang-bar">
  <div class="lang-group">
    <div class="lang-label" id="labelSrc">中文</div>
    <div class="lang-btns">
      <button class="lang-btn active" data-lang="zh" onclick="setLang('src',this)">中文</button>
      <button class="lang-btn" data-lang="ja" onclick="setLang('src',this)">日文</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('src',this)">英文</button>
    </div>
  </div>
  <button class="lang-swap" onclick="swapLang()">⇄</button>
  <div class="lang-group">
    <div class="lang-label" id="labelDst">日本語</div>
    <div class="lang-btns">
      <button class="lang-btn" data-lang="zh" onclick="setLang('dst',this)">中文</button>
      <button class="lang-btn active" data-lang="ja" onclick="setLang('dst',this)">日文</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('dst',this)">英文</button>
    </div>
  </div>
</div>

<div class="mic-area">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="mic-status" id="micStatus">点击🎤开始 · 说完自动翻译 · 循环续听</div>
</div>

<div class="toggle-row">
  <span>自动朗读翻译</span>
  <div class="toggle on" id="autoSpeakToggle" onclick="toggleAutoSpeak()"></div>
</div>

<div class="box">
  <div class="card">
    <div class="card-label"><span>📝 识别文字</span><span class="tag" id="srcTag">中文</span></div>
    <div class="card-text" id="recogText"><span class="hint">等待语音…</span></div>
  </div>
  <div class="card">
    <div class="card-label"><span>🌐 翻译结果</span><span class="tag" id="dstTag">日本語</span></div>
    <div class="card-text" id="transText"><span class="hint">Gemini 翻译…</span></div>
    <div class="actions">
      <button class="btn" onclick="copyTrans()">📋 复制</button>
      <button class="btn" onclick="speakTrans()">🔊 朗读</button>
    </div>
  </div>
</div>

<div class="manual-area">
  <div class="manual-toggle" onclick="toggleManual()">✏️ 键盘输入</div>
  <div class="manual-box" id="manualBox">
    <textarea id="manualInput" placeholder="输入后自动翻译…" oninput="onManualInput()"></textarea>
  </div>
</div>

<div class="history-section">
  <div class="history-title"><span>📜 记录</span><button class="clear-btn" onclick="clearHistory()">清除</button></div>
  <div id="historyList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const LANG = {
  zh: { label: '中文', whisper: 'zh', tts: 'zh-CN', gemini: 'Chinese' },
  ja: { label: '日本語', whisper: 'ja', tts: 'ja', gemini: 'Japanese' },
  en: { label: 'English', whisper: 'en', tts: 'en-US', gemini: 'English' },
};
let srcLang = 'zh', dstLang = 'ja';
let autoSpeak = true;
let isActive = false, isBusy = false;
let mediaRecorder = null, audioChunks = [];
let stream = null, audioCtx = null;
let silenceTimer = null;
let history = [], manualOpen = false;

try {
  const d = localStorage.getItem('wk');
  if (d) { document.getElementById('openaiKey').value = d; }
  const g = localStorage.getItem('gk2');
  if (g) { document.getElementById('geminiKey').value = g; }
  const h = localStorage.getItem('wh');
  if (h) history = JSON.parse(h);
  // 如果已有保存的key，隐藏输入框
  if (d && g) { showSavedState(); }
} catch(e) {}
renderHistory();

function getKeys() {
  const ok = document.getElementById('openaiKey').value.trim();
  const gk = document.getElementById('geminiKey').value.trim();
  if (!ok || !gk) {
    showToast('⚠ 请先设置 API Keys');
    showKeyInput();
    return null;
  }
  localStorage.setItem('wk', ok);
  localStorage.setItem('gk2', gk);
  return { openai: ok, gemini: gk };
}

function saveKeys() {
  const ok = document.getElementById('openaiKey').value.trim();
  const gk = document.getElementById('geminiKey').value.trim();
  if (!ok) { showToast('请输入 OpenAI Key'); return; }
  if (!gk) { showToast('请输入 Gemini Key'); return; }
  localStorage.setItem('wk', ok);
  localStorage.setItem('gk2', gk);
  showSavedState();
  showToast('✅ Keys 已保存');
}

function showSavedState() {
  document.getElementById('keyBar').style.display = 'none';
  document.getElementById('keySaved').style.display = 'flex';
}

function showKeyInput() {
  document.getElementById('keyBar').style.display = 'flex';
  document.getElementById('keySaved').style.display = 'none';
}

function setLang(role, btn) {
  btn.parentElement.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (role === 'src') srcLang = btn.dataset.lang;
  else dstLang = btn.dataset.lang;
  document.getElementById('labelSrc').textContent = LANG[srcLang].label;
  document.getElementById('labelDst').textContent = LANG[dstLang].label;
  document.getElementById('srcTag').textContent = LANG[srcLang].label;
  document.getElementById('dstTag').textContent = LANG[dstLang].label;
}
function swapLang() {
  [srcLang, dstLang] = [dstLang, srcLang];
  document.getElementById('labelSrc').textContent = LANG[srcLang].label;
  document.getElementById('labelDst').textContent = LANG[dstLang].label;
  document.getElementById('srcTag').textContent = LANG[srcLang].label;
  document.getElementById('dstTag').textContent = LANG[dstLang].label;
  document.querySelectorAll('.lang-group:first-child .lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === srcLang));
  document.querySelectorAll('.lang-group:last-child .lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === dstLang));
}

// ── 麦克风 ──
function toggleMic() {
  if (isActive || isBusy) { stopAll(); }
  else { if (!getKeys()) return; startRec(); }
}

async function startRec() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
            : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
            : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus') ? 'audio/ogg;codecs=opus'
            : 'audio/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType: mt });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { handleAudioStop(); };
    mediaRecorder.start();

    // 音量检测
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    const analyzer = audioCtx.createAnalyser();
    analyzer.fftSize = 256;
    src.connect(analyzer);

    let silentSince = null;
    function checkVolume() {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
      const data = new Uint8Array(analyzer.frequencyBinCount);
      analyzer.getByteFrequencyData(data);
      const vol = data.reduce((a, b) => a + b, 0) / data.length / 255;

      if (vol < 0.02) {
        if (silentSince === null) silentSince = Date.now();
        else if (Date.now() - silentSince > 1500 && audioChunks.length > 1) {
          // 静音1.5秒且有录音内容 → 停止
          mediaRecorder.stop();
          return;
        }
      } else {
        silentSince = null;
      }
      requestAnimationFrame(checkVolume);
    }
    checkVolume();

    isActive = true; isBusy = false;
    updateUI();
  } catch(e) {
    showToast('⚠ 麦克风访问被拒绝');
  }
}

function handleAudioStop() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  isActive = false; isBusy = true;
  updateUI();

  const blob = new Blob(audioChunks, { type: mediaRecorder?.mimeType || 'audio/webm' });
  if (blob.size < 2000) {
    showToast('⚠ 录音太短');
    isBusy = false;
    // 自动重启
    if (!isActive) startRec();
    return;
  }
  whisperTranscribe(blob);
}

function stopAll() {
  isActive = false; isBusy = false;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') { try { mediaRecorder.stop(); } catch(e) {} }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  mediaRecorder = null;
  updateUI();
}

function updateUI() {
  const btn = document.getElementById('micBtn');
  const st = document.getElementById('micStatus');
  if (isBusy) {
    btn.className = 'mic-btn busy'; btn.textContent = '⏳';
    st.textContent = 'Whisper 识别中…'; st.className = 'mic-status';
  } else if (isActive) {
    btn.className = 'mic-btn recording'; btn.textContent = '🔴';
    st.textContent = '🎤 录音中… 静音后自动翻译'; st.className = 'mic-status active';
  } else {
    btn.className = 'mic-btn'; btn.textContent = '🎤';
    st.textContent = '点击🎤开始 · 说完自动翻译 · 循环续听'; st.className = 'mic-status';
  }
}

// ── Whisper API ──
async function whisperTranscribe(blob) {
  const keys = getKeys();
  if (!keys) { isBusy = false; updateUI(); return; }

  try {
    const form = new FormData();
    form.append('file', blob, 'audio.webm');
    form.append('model', 'whisper-1');
    form.append('language', LANG[srcLang].whisper);
    form.append('response_format', 'json');

    const resp = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${keys.openai}` },
      body: form
    });

    if (!resp.ok) {
      const err = await resp.text();
      if (resp.status === 401) showToast('⚠ OpenAI Key 无效');
      else if (resp.status === 429) showToast('⚠ API 配额超限');
      else showToast(`⚠ Whisper 错误 ${resp.status}`);
      isBusy = false; updateUI();
      if (!isActive) startRec();
      return;
    }

    const data = await resp.json();
    const transcript = (data.text || '').trim();
    if (!transcript) {
      showToast('⚠ 未识别到语音');
      isBusy = false; updateUI();
      if (!isActive) startRec();
      return;
    }

    document.getElementById('recogText').textContent = transcript;
    document.getElementById('recogText').className = 'card-text fade-in';

    // 用 Gemini 翻译
    await geminiTranslate(transcript);

  } catch(e) {
    showToast('⚠ 网络错误');
    isBusy = false; updateUI();
    if (!isActive) startRec();
  }
}

// ── Gemini 翻译 ──
async function geminiTranslate(text) {
  const keys = getKeys();
  try {
    const prompt = `Translate the following text from ${LANG[srcLang].gemini} to ${LANG[dstLang].gemini}. Respond with ONLY the translation, no explanation, no quotes, no markdown.

Text: ${text}`;

    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${keys.gemini}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      }
    );

    if (!resp.ok) {
      showToast(`⚠ Gemini 错误 ${resp.status}`);
      isBusy = false; updateUI();
      if (!isActive) startRec();
      return;
    }

    const data = await resp.json();
    const translation = (data?.candidates?.[0]?.content?.parts?.[0]?.text || '').trim();

    if (translation) {
      document.getElementById('transText').textContent = translation;
      document.getElementById('transText').className = 'card-text fade-in';
      addHistory(text, translation);

      if (autoSpeak) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(translation);
        u.lang = LANG[dstLang].tts;
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
      }
    }
  } catch(e) {
    showToast('⚠ 翻译网络错误');
  }

  // 完成 → 自动重启录音
  isBusy = false;
  updateUI();
  if (!isActive) startRec();
}

// ── 朗读 ──
function speakTrans() {
  const t = document.getElementById('transText').textContent;
  if (!t || t === 'Gemini 翻译…') return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(t);
  u.lang = LANG[dstLang].tts; u.rate = 0.9;
  window.speechSynthesis.speak(u);
  showToast('🔊 朗读');
}
function toggleAutoSpeak() {
  autoSpeak = !autoSpeak;
  document.getElementById('autoSpeakToggle').classList.toggle('on', autoSpeak);
}

// ── 手动翻译 ──
function toggleManual() {
  manualOpen = !manualOpen;
  document.getElementById('manualBox').classList.toggle('show', manualOpen);
  if (manualOpen) document.getElementById('manualInput').focus();
}
let manualTimer;
function onManualInput() {
  clearTimeout(manualTimer);
  const t = document.getElementById('manualInput').value.trim();
  if (!t) { document.getElementById('transText').innerHTML = '<span class="hint">输入后自动翻译…</span>'; return; }
  document.getElementById('recogText').textContent = t;
  manualTimer = setTimeout(() => {
    document.getElementById('transText').innerHTML = '⏳';
    geminiTranslate(t);
  }, 600);
}

// ── 复制 ──
function copyTrans() {
  const t = document.getElementById('transText').textContent;
  if (!t || t === 'Gemini 翻译…') return;
  navigator.clipboard.writeText(t).then(() => showToast('📋 已复制')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); showToast('📋 已复制');
  });
}

// ── 历史 ──
function addHistory(s, d) {
  const n = new Date();
  const t = n.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  history.unshift({ src: s, dst: d, time: t, sl: LANG[srcLang].label, dl: LANG[dstLang].label });
  if (history.length > 50) history.pop();
  localStorage.setItem('wh', JSON.stringify(history));
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) { el.innerHTML = '<div style="text-align:center;color:#c7c7cc;padding:16px;font-size:13px">暂无记录</div>'; return; }
  el.innerHTML = history.map(h => `<div class="history-item"><button class="hi-copy" onclick="copyText('${escHtml(h.dst)}')">复制</button><div class="hi-src">${escHtml(h.src)}</div><div class="hi-dst">${escHtml(h.dst)}</div><div class="hi-meta">${h.sl} → ${h.dl} · ${h.time}</div></div>`).join('');
}
function clearHistory() { history = []; localStorage.setItem('wh', '[]'); renderHistory(); showToast('已清除'); }
function copyText(t) {
  navigator.clipboard.writeText(t).then(() => showToast('📋 已复制')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); showToast('📋 已复制');
  });
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  clearTimeout(t._hide); t._hide = setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
